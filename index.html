<title>Project G — Prototype v2</title>
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Project G — Prototype v2</title><style>
:root{
  --bg:#0b0d12; --panel:#151822; --panel2:#1b1f2c; --border:#3f4658;
  --gold:#c9a15a; --gold-dim:#8a743f; --select:#5ec8f0;
  --text:#e8e4d8; --muted:#9aa0b0; --muted2:#6b7280;
  --up:#4fae7c; --down:#d9635a;
  --font-display:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
:root[data-theme="light"]{
  --bg:#f2ede1; --panel:#fff; --panel2:#f7f3e8; --border:#d8cfb8;
  --gold:#a67c2e; --gold-dim:#c9a15a; --select:#1f6fb2;
  --text:#26221a; --muted:#726b58; --up:#2f8f5c; --down:#b8443c;
}
@media (prefers-color-scheme:light){:root:not([data-theme="dark"]){
  --bg:#f2ede1; --panel:#fff; --panel2:#f7f3e8; --border:#d8cfb8;
  --gold:#a67c2e; --gold-dim:#c9a15a; --select:#1f6fb2;
  --text:#26221a; --muted:#726b58; --up:#2f8f5c; --down:#b8443c;
}}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-ui);}
body{padding:16px;min-height:100vh;}
h1,h2,h3{font-family:var(--font-display);margin:0;text-wrap:balance;}
.num{font-variant-numeric:tabular-nums;}
.up{color:var(--up);} .down{color:var(--down);}
.app{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:14px;}

/* top status bar */
.hud{display:flex;align-items:center;gap:18px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 18px;flex-wrap:wrap;}
.hud h1{font-size:20px;color:var(--gold);letter-spacing:.3px;}
.hud .sub{font-size:11px;color:var(--muted);margin-top:2px;}
.hud .stat{display:flex;flex-direction:column;gap:1px;}
.hud .stat .label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);}
.hud .stat .val{font-size:16px;font-weight:600;}
.spacer{flex:1;}

button{font-family:var(--font-ui);cursor:pointer;border-radius:7px;border:1px solid var(--border);background:var(--panel2);color:var(--text);padding:7px 13px;font-size:13px;transition:.12s;}
button:hover{border-color:var(--gold-dim);}
button:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
button.primary{background:var(--gold);border-color:var(--gold);color:#1a1508;font-weight:700;}
button.primary:hover{background:var(--gold-dim);}
button:disabled{opacity:.35;cursor:not-allowed;}
button.small{padding:4px 9px;font-size:12px;}
button.insufficient{border-color:var(--down);color:var(--down);background:rgba(217,99,90,.12);}
button.active{border-color:var(--gold);color:var(--gold);}

.screen{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px 22px;}
.screen-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.screen-head h2{font-size:18px;color:var(--gold);}
.back{font-size:13px;color:var(--muted);}

/* hub */
.hub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
.hub-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:26px 14px;border:1px solid var(--border);border-radius:12px;background:var(--panel2);cursor:pointer;transition:.14s;}
.hub-card:hover{border-color:var(--gold);transform:translateY(-2px);}
.hub-card .ico{font-size:38px;line-height:1;}
.hub-card .name{font-family:var(--font-display);font-size:17px;font-weight:600;}
.hub-card .desc{font-size:11.5px;color:var(--muted);text-align:center;line-height:1.4;}
.hub-start{display:flex;align-items:center;justify-content:center;gap:10px;padding:18px;border-radius:12px;border:none;background:linear-gradient(90deg,var(--panel2),var(--gold));color:#1a1508;font-family:var(--font-display);font-size:20px;font-weight:700;cursor:pointer;width:100%;}
.hub-start:hover{filter:brightness(1.06);}

/* stock list */
.sort-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.sort-row .lbl{font-size:12px;color:var(--muted);margin-right:4px;}
.stock{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:10px 12px;border:1px solid var(--border);border-radius:9px;background:var(--panel2);margin-bottom:7px;border-left-width:3px;}
.stock .ico{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;}
.stock .nm{font-family:var(--font-display);font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;}
.stock .lv{font-size:11px;color:var(--gold);border:1px solid var(--gold-dim);border-radius:4px;padding:0 5px;}
.stock .meta{font-size:11px;color:var(--muted);margin-top:2px;}
.expbar{height:4px;border-radius:2px;background:var(--border);margin-top:4px;overflow:hidden;max-width:170px;}
.expbar>div{height:100%;background:var(--gold);}
.stock .price{text-align:right;}
.stock .price .p{font-size:15px;font-weight:700;}
.stock .price .d{font-size:11px;font-weight:600;}
.stock .acts{display:flex;flex-direction:column;gap:4px;}

/* oracle */
.info-card{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:11px 13px;border:1px solid var(--border);border-radius:9px;background:var(--panel2);margin-bottom:8px;}
.info-card .when{font-size:12px;}
.info-card .when b{color:var(--gold);}
.info-card .buys{display:flex;flex-direction:column;gap:5px;}
.info-tabs{display:flex;gap:6px;margin-bottom:12px;}
.owned-info{padding:10px 12px;border:1px dashed var(--gold-dim);border-radius:9px;background:var(--panel2);margin-bottom:8px;font-size:13px;line-height:1.5;}
.owned-info.realized{border-style:solid;border-color:#4fae7c;opacity:.8;}
.realized-banner{padding:10px 12px;border:1px solid #4fae7c;border-radius:9px;background:#4fae7c22;margin-bottom:12px;font-size:12.5px;line-height:1.6;}

/* news */
.news{max-width:560px;margin:0 auto;border:2px solid var(--border);border-radius:6px;padding:20px 24px;background:var(--panel2);}
.news .masthead{display:flex;justify-content:space-between;align-items:baseline;border-bottom:3px double var(--border);padding-bottom:8px;margin-bottom:14px;}
.news .masthead .title{font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:1px;}
.news .masthead .date{font-size:11px;color:var(--muted);}
.news .headline{font-family:var(--font-display);font-size:19px;font-weight:700;margin-bottom:10px;line-height:1.35;}
.news .body{font-size:13px;line-height:1.7;color:var(--text);margin-bottom:14px;}
.news .kw{display:flex;flex-wrap:wrap;gap:6px;}
.news .kw span{font-size:11.5px;border:1px solid var(--gold-dim);color:var(--gold);border-radius:20px;padding:2px 10px;}

/* setup roster */
.setup{display:grid;grid-template-columns:1fr 1.3fr;gap:16px;}
.wave-info{border:1px solid var(--border);border-radius:10px;padding:14px;background:var(--panel2);}
.wave-info .r{display:flex;gap:10px;margin-bottom:12px;}
.wave-info .r .ic{font-size:26px;}
.wave-info .r .t{font-size:13px;}
.wave-info .r .t b{display:block;font-family:var(--font-display);font-size:15px;margin-bottom:2px;}
.wave-info .r .t small{color:var(--muted);font-size:11.5px;line-height:1.4;}
.slots{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;}
.slot{width:52px;height:52px;border:2px dashed var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--panel2);cursor:pointer;position:relative;}
.slot.filled{border-style:solid;}
.slot .x{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--down);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;}
.roster{display:grid;grid-template-columns:1fr 1fr;gap:7px;max-height:340px;overflow-y:auto;}
.rg{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:9px;background:var(--panel2);cursor:pointer;border-left-width:3px;}
.rg.locked{opacity:.45;cursor:not-allowed;}
.rg.deployed{outline:2px solid var(--gold);}
.rg .ico{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;}
.rg .nm{font-family:var(--font-display);font-size:14px;font-weight:600;}
.rg .lv{font-size:11px;color:var(--gold);}

/* combat */
.combat-wrap{display:grid;grid-template-columns:1fr 260px;gap:14px;}
canvas{background:var(--panel2);border-radius:8px;width:100%;height:auto;display:block;}
.combat-side{border:1px solid var(--border);border-radius:10px;padding:12px;background:var(--panel2);font-size:12.5px;}
.combat-side h3{font-family:var(--font-display);font-size:15px;margin-bottom:6px;}
.combat-side .row{display:flex;justify-content:space-between;padding:2px 0;color:var(--muted);}
.combat-side .row b{color:var(--text);}
.log{margin-top:10px;max-height:150px;overflow-y:auto;display:flex;flex-direction:column-reverse;gap:4px;}
.log .li{font-size:11.5px;padding:5px 7px;border-radius:6px;background:var(--panel);border-left:3px solid var(--gold-dim);}

/* result */
.result{text-align:center;padding:40px 20px;}
.result .big{font-family:var(--font-display);font-size:52px;font-weight:700;letter-spacing:2px;}
.result .sub{font-size:15px;color:var(--muted);margin:6px 0 22px;}
.result .stats{display:inline-grid;grid-template-columns:auto auto;gap:8px 26px;text-align:left;font-size:14px;margin-bottom:24px;}
.result .stats .k{color:var(--muted);}

/* starting pick */
.pick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.pick{border:1px solid var(--border);border-radius:12px;padding:22px 16px;background:var(--panel2);text-align:center;cursor:pointer;transition:.14s;}
.pick:hover{border-color:var(--gold);transform:translateY(-2px);}
.pick .ic{font-size:44px;}
.pick .nm{font-family:var(--font-display);font-size:19px;font-weight:600;margin:8px 0 6px;}
.pick .ds{font-size:12px;color:var(--muted);line-height:1.5;}

footer{text-align:center;color:var(--muted);font-size:11px;padding:6px 0;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

@media (max-width:820px){
  .setup,.combat-wrap{grid-template-columns:1fr;}
  .hub-grid,.pick-grid{grid-template-columns:1fr;}
  .roster{grid-template-columns:1fr;}
}
</style></head><body>

<div class="app">
  <div class="hud">
    <div>
      <h1>Project G</h1>
      <div class="sub">신탁 기반 방어 × 주식투자 — 플로우 v2</div>

</div>

/* ===================== PRICING (원본 §9.5 이식) ===================== */
const wsMid = id => (WS_MIN[id] + (WS_MAX[id]>1000?100:WS_MAX[id]))/2;
const clampWS = (id,v)=> Math.max(WS_MIN[id], WS_MAX[id]>1000? v : Math.min(WS_MAX[id],v));
function absM(){ return (state.ws[7]/BASE_POP)*(state.ws[6]/BASE_FAITH); }
function initPrices(){
  const M=absM();
  GODS.forEach(g=>{
    const cur=state.ws[g.coreWS], mid=wsMid(g.coreWS);
    const D = g.corr===0 ? (100+cur-mid)/100 : (100-cur+mid)/100;
    const p=Math.max(10, Math.round(g.basePrice*D*M));
    state.price[g.id]=p; state.prevPrice[g.id]=p;
  });
}
/* level from shares: LV = shares; attack = dmg * LV * price/basePrice */
function godLevel(id){ return state.holdings[id]?.shares || 0; }
function godAttack(id){
  const g=godById(id), lv=godLevel(id);
  if(lv<=0) return 0;
  return g.dmg * lv * (state.price[id]/g.basePrice);
}

/* ===================== EVENT PRE-ROLL (원본 §4-D) ===================== */
function eventEligible(ev,used){
  if(used.has(ev.id)) return false;
  if(ev.cond){ const [id,op,val]=ev.cond; const c=state.ws[id];
    if(op===0 && !(c>=val)) return false; if(op===1 && !(c<val)) return false; }
  return true;
}
function eventWeight(ev){ let w=ev.w; ev.cause.forEach(([id,val])=>{ w+=state.ws[id]*(val/100); }); return Math.max(0,w); }
function pickEvent(used){
  const pool=EVENTS.filter(e=>eventEligible(e,used));
  if(!pool.length) return null;
  const ws=pool.map(eventWeight), tot=ws.reduce((a,b)=>a+b,0);
  if(tot<=0) return pool[Math.floor(Math.random()*pool.length)];
  let r=Math.random()*tot;
  for(let i=0;i<pool.length;i++){ r-=ws[i]; if(r<=0) return pool[i]; }
  return pool[pool.length-1];
}
// pre-roll the whole run's events up front so the oracle can foresee them (§4-D)
function prerollAllWaves(){
  state.waveEvents = [null]; // 1-indexed
  const used = new Set();
  for(let w=1;w<=TOTAL_WAVES;w++){
    const cnt = 1 + Math.floor(Math.random()*2);
    const list=[];
    for(let i=0;i<cnt;i++){ const e=pickEvent(used); if(!e) break; used.add(e.id); list.push(e.id); }
    state.waveEvents[w]=list;
  }
}
// apply a wave's events to WS scores + reprice gods
function applyWaveEvents(w){
  state.justRealized=[];
  state.ownedInfo.forEach(o=>{ if(!o.realized && o.wave===w){ o.realized=true; state.justRealized.push(o); } });
  (state.waveEvents[w]||[]).forEach(eid=>{
    const ev=EVENTS.find(e=>e.id===eid); if(!ev) return;
    // snapshot D + pop/faith BEFORE (원본 버그픽스 반영)
    const lastD={}, lastPop=state.ws[7], lastFaith=state.ws[6];
    GODS.forEach(g=>{ const cur=state.ws[g.coreWS],mid=wsMid(g.coreWS);
      lastD[g.id]= g.corr===0?(100+cur-mid)/100:(100-cur+mid)/100; });
    ev.effWS.forEach(([ids,val])=> ids.forEach(id=> state.ws[id]=clampWS(id,state.ws[id]+val)));
    const affected=new Map();
    ev.effGod.forEach(([ids,val])=> ids.forEach(id=> affected.set(id,(affected.get(id)||0)+val)));
    const M=(state.ws[7]/lastPop)*(state.ws[6]/lastFaith);
    GODS.forEach(g=>{
      const A=state.price[g.id], C=affected.get(g.id)||0;
      const cur=state.ws[g.coreWS],mid=wsMid(g.coreWS);
      const D=g.corr===0?(100+cur-mid)/100:(100-cur+mid)/100;
      state.prevPrice[g.id]=A;
      state.price[g.id]=Math.max(10, Math.round(A*(1+C/100)*D*M/(lastD[g.id]||D)));
    });
  });
}

/* ===================== TRADING ===================== */
function buy(id,qty=1){
  const p=state.price[id], cost=p*qty;
  if(state.coin<cost) return false;
  const h = state.holdings[id] || (state.holdings[id]={shares:0,avgPrice:0});
  h.avgPrice = h.shares===0? p : (h.avgPrice*h.shares + cost)/(h.shares+qty);
  h.shares+=qty; state.coin-=cost;
  return true;
}
function sell(id,qty=1){
  const h=state.holdings[id]; if(!h||h.shares<qty) return false;
  h.shares-=qty; state.coin+=state.price[id]*qty;
  if(h.shares===0){ h.avgPrice=0; state.roster=state.roster.filter(r=>r!==id); }
  return true;
}

/* ===================== ORACLE (오차범위 정보 — 신탁 개선) ===================== */
// build sellable info: for each future event, offer a card revealing the wave
// it happens on, blurred by an error margin. Premium ±1 (정확), cheap ±3 (부정확).
function sellableInfo(){
  const out=[];
  for(let w=state.wave+1;w<=TOTAL_WAVES;w++){
    (state.waveEvents[w]||[]).forEach(eid=>{
      const ev=EVENTS.find(e=>e.id===eid); if(!ev) return;
      // pick the most-affected god as the "관련 주"
      let topId=null, topAbs=0;
      ev.effGod.forEach(([ids,val])=> ids.forEach(id=>{ if(Math.abs(val)>topAbs){topAbs=Math.abs(val);topId=id;} }));
      if(topId==null) return;
      out.push({eid, wave:w, godId:topId});
    });
  }
  return out;
}
const hermesDiscount = ()=> godLevel(9)>0 ? 0.8 : 1;
function buyInfo(card, margin){
  const cost = Math.round((margin===1?1000:500)*hermesDiscount());
  if(state.coin<cost) return false;
  state.coin-=cost;
  state.ownedInfo.push({godId:card.godId, wave:card.wave, margin, eid:card.eid, realized:false});
  return true;
}

/* ===================== NEWS (키워드 힌트) ===================== */
// derive a headline + keywords from the trend of the next few waves' events
function currentNews(){
  const upcoming=[];
  for(let w=state.wave;w<=Math.min(TOTAL_WAVES,state.wave+3);w++) (state.waveEvents[w]||[]).forEach(id=>upcoming.push(id));
  const wsShift={};
  upcoming.forEach(id=>{ const ev=EVENTS.find(e=>e.id===id); if(!ev) return;
    ev.effWS.forEach(([ids,val])=> ids.forEach(i=> wsShift[i]=(wsShift[i]||0)+val)); });
  const nm=id=>WS_DEFS.find(w=>w.id==id).name;
  // several WS scores (e.g. 풍요/인류밀집/인류의 수) always move together in the event
  // data — showing each as its own tag reads as redundant/overlapping noise, so merge
  // any scores that shifted by the exact same net amount into a single combined tag
  const byVal={};
  Object.entries(wsShift).forEach(([id,v])=>{ if(v===0) return; (byVal[v]=byVal[v]||[]).push(+id); });
  const groups = Object.entries(byVal).map(([v,ids])=>({v:+v, label: ids.sort((a,b)=>a-b).map(nm).join('·')}));
  const rising = groups.filter(g=>g.v>0).sort((a,b)=>b.v-a.v).slice(0,2);
  const falling = groups.filter(g=>g.v<0).sort((a,b)=>a.v-b.v).slice(0,2);
  const kws=[];
  rising.forEach(g=>kws.push(g.label+" 상승 조짐"));
  falling.forEach(g=>kws.push(g.label+" 하락 우려"));
  const firstEv = upcoming.length? EVENTS.find(e=>e.id===upcoming[0]) : null;
  return {
    headline: firstEv? firstEv.desc : "인간계는 잠시 평온을 되찾았습니다.",
    body:"아르고스 통신원들이 인간계 전역의 동향을 취재했습니다. 다가올 사건들의 조짐이 시장 곳곳에서 감지되고 있습니다. 현명한 투자자는 이 신호를 놓치지 않을 것입니다.",
    keywords: kws.length? kws : ["큰 변화 없음"]
  };
}

function sortBtn(k,label){ return `<button class="small ${state.sortKey===k?'active':''}" data-sort="${k}">${label}</button>`; }

  return `<div class="result">
    <div class="big" style="color:${win?'var(--up)':'var(--down)'}">${win?'WIN':'LOSE'}</div>
    <div class="sub">${win? (state.wave>=TOTAL_WAVES?'모든 웨이브를 방어했습니다!':'다음 웨이브로 진행합니다.') : `웨이브 ${state.wave}에서 방어에 실패했습니다.`}</div>
    <div class="stats">
      <span class="k">처치 수</span><span class="num">${r.kills}</span>
      <span class="k">최종 자산</span><span class="num">${fmt(assets())}</span>
      <span class="k">자산 증감</span><span class="num ${growth>=1?'up':'down'}">${growth>=1?'+':''}${((growth-1)*100).toFixed(0)}%</span>
    </div>
    <div>
      ${win && state.wave<TOTAL_WAVES ? `<button class="primary" data-go="nextwave">다음 웨이브 진행 →</button>` :
        `<button class="primary" data-restart="1">다시 시작</button>`}
    </div>
  </div>`;
}

/* ===================== COMBAT (자동 전투, 고정 전장) ===================== */
let combatState=null, combatRAF=null;
function viewCombat(){
  const isBoss=(state.wave%5===0);
  return `<div class="screen-head"><h2>전투 · 웨이브 ${String(state.wave).padStart(2,'0')}</h2>
    <span class="back" id="cbWaveInfo"></span></div>
    <div class="combat-wrap">
      <canvas id="cbCanvas" width="460" height="400"></canvas>
      <div class="combat-side">
        <h3>전황</h3>
        <div class="row"><span>출현 진행</span><b id="cbTime">—</b></div>
        <div class="row"><span>필드 몬스터</span><b id="cbMon">—</b></div>
        <div class="row"><span>처치 수</span><b id="cbKills">—</b></div>
        ${isBoss?`<div class="row"><span>보스 HP</span><b id="cbBoss">—</b></div>`:''}
        <h3 style="margin-top:12px;">출전 신</h3>
        <div id="cbGods"></div>
        <div class="log" id="cbLog"></div>
      </div>
    </div>`;
}
/* central arena: a grid of god cells. monsters circle the PERIMETER of this
   rect (빙글빙글). gods sit in cells and are drag-swappable. */
const GRID_COLS=5, GRID_ROWS=3;
// road ring sits 60px out from near cells (edge), 90/120/150px from mid/far cells,
// but a NEAR CORNER cell's farthest relevant point is the road's corner turn (~108px
// diagonally) — a melee god parked in a corner must still reach a monster rounding
// that corner, so near-tier values are sized past 108px, not just the 60px edge.
const RANGE_TABLE={1:120, 2:135, 3:155, 4:170, 5:190};
const rangePxOf = g => RANGE_TABLE[g.range] || (g.range*30+50);
function cellCenter(cs,idx){
  const col=idx%GRID_COLS, row=Math.floor(idx/GRID_COLS);
  const cw=cs.gridRect.w/GRID_COLS, ch=cs.gridRect.h/GRID_ROWS;
  return [cs.gridRect.x+(col+0.5)*cw, cs.gridRect.y+(row+0.5)*ch];
}
function cellAt(cs,px,py){
  const {x,y,w,h}=cs.gridRect;
  if(px<x||py<y||px>=x+w||py>=y+h) return -1;
  const col=Math.floor((px-x)/(w/GRID_COLS)), row=Math.floor((py-y)/(h/GRID_ROWS));
  return row*GRID_COLS+col;
}
function perimPoint(cs,d){
  const {x,y,w,h}=cs.pathRect, per=2*(w+h); d=((d%per)+per)%per;
  if(d<w) return [x+d,y];
  if(d<w+h) return [x+w,y+(d-w)];
  if(d<2*w+h) return [x+w-(d-w-h),y+h];
  return [x,y+h-(d-2*w-h)];
}
function startCombat(){
  const w=state.wave, isBoss=(w%5===0);
  applyWaveEvents(w);
  // HP ramps up faster wave-over-wave (compounding, not just linear) so the game
  // actually gets harder, not just longer
  const baseHP=Math.round(16*Math.pow(1.22,w-1)+w*4);
  // 5x3 grid of 60px cells; the monster ROAD is a separate ring offset outward
  // from the grid (asymmetric margin so column position, not just row, drives range tier)
  const gridRect={x:80,y:110,w:300,h:180};
  const pathRect={x:50,y:50,w:360,h:300};
  const cells=Array(GRID_COLS*GRID_ROWS).fill(null);
  // fill outer ring first (center cell only reaches the road with long range)
  const cellOrder=[0,4,10,14,1,3,11,13,5,9,6,8,2,12,7];
  state.roster.forEach((id,i)=>{ cells[cellOrder[i]]=id; });
  // wave clears once a FIXED headcount of monsters has been spawned and killed
  // (boss waves also spawn a smaller escort headcount alongside the boss)
  const total = isBoss ? 8+Math.floor(w/5)*2 : 10+w*2;
  combatState={
    w, isBoss, gridRect, pathRect, cells, monsters:[], kills:0, elapsed:0,
    spawnT:0, spawned:0, total, baseHP, over: isBoss?30:20,   // lose if this many monsters pile up circling
    perim:2*(pathRect.w+pathRect.h), boss:null, done:false, last:performance.now(),
    drag:null, fxBurst:[], fxCoin:[],
  };
  if(isBoss) combatState.boss={ hp:baseHP*10, maxHp:baseHP*10, d:0, name:state.bossName };
  $('cbWaveInfo').textContent=isBoss?`등장 보스 : ${state.bossName}`:'일반 웨이브';
  renderCombatGods();
  bindCombatDrag();
  combatRAF=requestAnimationFrame(combatLoop);
}
function renderCombatGods(){
  const cs=combatState;
  const ids=cs.cells.filter(Boolean);
  $('cbGods').innerHTML = ids.map(id=>{ const g=godById(id);
    return `<div class="row"><span>${g.icon} ${g.kr} LV${godLevel(id)}</span><b>${godAttack(id).toFixed(0)}</b></div>`;
  }).join('') + `<div class="row" style="margin-top:6px;color:var(--muted2);font-size:11px;">칸을 드래그해 이동/스왑</div>`;
}
function spawnMonster(){
  const cs=combatState;
  const type=cs.w>=6 && Math.random()<0.5?'bird':'rat';
  const m=MONSTERS[type];
  // reward scales with wave too, so clearing later waves is worth meaningfully more
  const reward=Math.round((10+cs.w*2)*m.reward);
  cs.monsters.push({type, hp:Math.round(cs.baseHP*m.hp), maxHp:Math.round(cs.baseHP*m.hp),
    spd:m.spd, reward, d:0, alive:true});
  cs.spawned++;
}
function bindCombatDrag(){
  const cv=$('cbCanvas'); if(!cv) return;
  const toCanvas=e=>{ const r=cv.getBoundingClientRect();
    return [ (e.clientX-r.left)*(cv.width/r.width), (e.clientY-r.top)*(cv.height/r.height) ]; };
  cv.onpointerdown=e=>{ const cs=combatState; if(!cs)return;
    const [px,py]=toCanvas(e); const c=cellAt(cs,px,py);
    if(c>=0 && cs.cells[c]){ cs.drag={from:c, id:cs.cells[c], x:px, y:py}; cv.setPointerCapture(e.pointerId); }
  };
  cv.onpointermove=e=>{ const cs=combatState; if(!cs||!cs.drag)return; const [px,py]=toCanvas(e); cs.drag.x=px; cs.drag.y=py; };
  cv.onpointerup=e=>{ const cs=combatState; if(!cs||!cs.drag)return;
    const [px,py]=toCanvas(e); const to=cellAt(cs,px,py);
    if(to>=0 && to!==cs.drag.from){ const tmp=cs.cells[to]; cs.cells[to]=cs.drag.id; cs.cells[cs.drag.from]=tmp; renderCombatGods(); }
    cs.drag=null;
  };
}
function combatLoop(now){
  const cs=combatState; if(!cs||cs.done) return;
  const dt=Math.min(50, now-cs.last); cs.last=now;
  cs.elapsed+=dt/1000;
  // monsters spawn until the wave's fixed headcount is reached, then keep circling —
  // they never leave on their own, so they pile up. survival = kill rate must
  // outpace spawn rate. boss waves ALSO spawn escort monsters alongside the boss.
  if(cs.spawned<cs.total){ cs.spawnT+=dt; const interval=Math.max(600,1300-cs.w*30);
    if(cs.spawnT>=interval){ cs.spawnT=0; spawnMonster(); } }
  // monsters circle the perimeter (빙글빙글)
  cs.monsters.forEach(mon=>{ if(mon.alive) mon.d += (dt/1000)*mon.spd*90; });
  if(cs.boss) cs.boss.d += (dt/1000)*40;
  // gods attack
  for(let idx=0; idx<cs.cells.length; idx++){
    const id=cs.cells[idx]; if(!id) continue;
    const g=godById(id); const o=(cs._cd=cs._cd||{});
    o[idx]=(o[idx]||0)-dt; if(o[idx]>0) continue;
    const [cx,cy]=cellCenter(cs,idx), rangePx=rangePxOf(g);
    let target=null,tgtBoss=false,best=Infinity,bestHi=-1;
    cs.monsters.forEach(mon=>{ if(!mon.alive)return; const [mx,my]=perimPoint(cs,mon.d);
      if(Math.hypot(mx-cx,my-cy)<=rangePx){
        if(g.atkType===1){ if(mon.hp<best){best=mon.hp;target=mon;} }
        else if(g.atkType===2){ if(mon.maxHp>bestHi){bestHi=mon.maxHp;target=mon;} }
        else { if(mon.d>bestHi){bestHi=mon.d;target=mon;} }
      }});
    if(!target && cs.boss){ const [bx,by]=perimPoint(cs,cs.boss.d); if(Math.hypot(bx-cx,by-cy)<=rangePx){ target=cs.boss; tgtBoss=true; } }
    if(!target) continue;
    o[idx]=1000/(g.atkSpd/10);
    const [tx,ty]= tgtBoss? perimPoint(cs,cs.boss.d) : perimPoint(cs,target.d);
    cs._fx=cs._fx||[]; cs._fx.push({x:cx,y:cy,tx,ty,t:now,c:g.color});
    target.hp -= godAttack(id);
    if(target.hp<=0){
      if(tgtBoss){
        const bossReward=Math.round(cs.baseHP*4);
        cs.boss=null; cs.kills++; state.coin+=bossReward;
        cs.fxBurst.push({x:tx,y:ty,t:now}); cs.fxCoin.push({x:tx,y:ty,t:now,amt:bossReward});
        endCombat(true); return;
      }
      target.alive=false; cs.kills++; state.coin+=target.reward;
      const [dx,dy]=perimPoint(cs,target.d);
      cs.fxBurst.push({x:dx,y:dy,t:now});
      cs.fxCoin.push({x:dx,y:dy,t:now,amt:target.reward});
    }
  }
  cs.monsters=cs.monsters.filter(m=>m.alive);
  if(cs.monsters.length>cs.over){ endCombat(false); return; }
  // wave clears once every planned monster has spawned and died — boss waves also
  // require the boss dead (handled above via endCombat(true) on boss kill)
  if(!cs.isBoss && cs.spawned>=cs.total && cs.monsters.length===0){ endCombat(true); return; }
  drawCombat();
  $('cbTime').textContent=cs.spawned+' / '+cs.total+' 마리';
  $('cbMon').textContent=cs.monsters.length+' / '+cs.over;
  $('cbKills').textContent=cs.kills;
  if(cs.isBoss && $('cbBoss')) $('cbBoss').textContent=cs.boss?Math.max(0,Math.round(cs.boss.hp))+' / '+cs.boss.maxHp:'처치!';
  combatRAF=requestAnimationFrame(combatLoop);
}
function drawCombat(){
  const cs=combatState, cv=$('cbCanvas'); if(!cv)return; const ctx=cv.getContext('2d');
  const cssv=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  ctx.clearRect(0,0,cv.width,cv.height);
  const r=cs.gridRect, p=cs.pathRect;
  // road ring (offset outside the grid) — monsters circle this, not the grid border
  ctx.strokeStyle=cssv('--gold-dim'); ctx.lineWidth=18; ctx.globalAlpha=.25;
  ctx.strokeRect(p.x,p.y,p.w,p.h); ctx.globalAlpha=1;
  ctx.strokeStyle=cssv('--gold-dim'); ctx.lineWidth=2; ctx.setLineDash([6,5]);
  ctx.strokeRect(p.x,p.y,p.w,p.h); ctx.setLineDash([]);
  // arena fill + grid (gods live here, inset from the road)
  ctx.fillStyle=cssv('--panel'); ctx.fillRect(r.x,r.y,r.w,r.h);
  ctx.strokeStyle=cssv('--border'); ctx.lineWidth=2; ctx.strokeRect(r.x,r.y,r.w,r.h);
  ctx.lineWidth=1;
  for(let c=1;c<GRID_COLS;c++){ ctx.beginPath(); ctx.moveTo(r.x+c*r.w/GRID_COLS,r.y); ctx.lineTo(r.x+c*r.w/GRID_COLS,r.y+r.h); ctx.stroke(); }
  for(let rr=1;rr<GRID_ROWS;rr++){ ctx.beginPath(); ctx.moveTo(r.x,r.y+rr*r.h/GRID_ROWS); ctx.lineTo(r.x+r.w,r.y+rr*r.h/GRID_ROWS); ctx.stroke(); }
  // attack flashes
  const now=performance.now(); cs._fx=(cs._fx||[]).filter(f=>now-f.t<130);
  cs._fx.forEach(f=>{ ctx.strokeStyle=f.c; ctx.lineWidth=2; ctx.globalAlpha=1-(now-f.t)/130;
    ctx.beginPath(); ctx.moveTo(f.x,f.y); ctx.lineTo(f.tx,f.ty); ctx.stroke(); ctx.globalAlpha=1; });
  // gods in cells
  for(let idx=0; idx<cs.cells.length; idx++){
    const id=cs.cells[idx]; if(!id) continue;
    if(cs.drag && cs.drag.from===idx) continue; // being dragged, draw at cursor later
    const g=godById(id), [cx,cy]=cellCenter(cs,idx);
    ctx.beginPath(); ctx.strokeStyle=g.color+'44'; ctx.lineWidth=1; ctx.arc(cx,cy,rangePxOf(g),0,7); ctx.stroke();
    ctx.fillStyle=g.color; ctx.beginPath(); ctx.arc(cx,cy,17,0,7); ctx.fill();
    ctx.fillStyle='#1a1508'; ctx.font='17px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(g.icon,cx,cy);
  }
  // monsters on perimeter — same sprite glyph shown in the wave-info list
  cs.monsters.forEach(mon=>{ if(!mon.alive)return; const [mx,my]=perimPoint(cs,mon.d);
    ctx.font='16px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(MONSTERS[mon.type].icon, mx, my);
    ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(mx-9,my-13,18,3);
    ctx.fillStyle='#4fae7c'; ctx.fillRect(mx-9,my-13,18*Math.max(0,mon.hp/mon.maxHp),3);
  });
  // boss on perimeter
  if(cs.boss){ const [bx,by]=perimPoint(cs,cs.boss.d);
    ctx.font='22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🗿',bx,by);
    ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(bx-26,by-22,52,5);
    ctx.fillStyle='#d9635a'; ctx.fillRect(bx-26,by-22,52*Math.max(0,cs.boss.hp/cs.boss.maxHp),5);
  }
  // kill burst effect (expanding ring)
  cs.fxBurst=(cs.fxBurst||[]).filter(f=>now-f.t<420);
  cs.fxBurst.forEach(f=>{ const t=(now-f.t)/420, rad=6+t*22;
    ctx.globalAlpha=1-t; ctx.strokeStyle='#ffcf5c'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(f.x,f.y,rad,0,7); ctx.stroke();
    ctx.fillStyle='#ffcf5c'; ctx.globalAlpha=(1-t)*0.5;
    for(let k=0;k<6;k++){ const ang=k*Math.PI/3, dist=rad*0.9;
      ctx.beginPath(); ctx.arc(f.x+Math.cos(ang)*dist,f.y+Math.sin(ang)*dist,2,0,7); ctx.fill(); }
    ctx.globalAlpha=1; });
  // floating "+coin" text
  cs.fxCoin=(cs.fxCoin||[]).filter(f=>now-f.t<700);
  cs.fxCoin.forEach(f=>{ const t=(now-f.t)/700;
    ctx.globalAlpha=1-t; ctx.fillStyle='#ffe6a0'; ctx.font='bold 12px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('+'+f.amt, f.x, f.y-8-t*18); ctx.globalAlpha=1; });
  // dragged god ghost at cursor
  if(cs.drag){ const g=godById(cs.drag.id);
    ctx.globalAlpha=.85; ctx.fillStyle=g.color; ctx.beginPath(); ctx.arc(cs.drag.x,cs.drag.y,17,0,7); ctx.fill();
    ctx.fillStyle='#1a1508'; ctx.font='17px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(g.icon,cs.drag.x,cs.drag.y); ctx.globalAlpha=1; }
}
function endCombat(win){
  if(!combatState||combatState.done) return;
  combatState.done=true;
  if(combatRAF) cancelAnimationFrame(combatRAF);
  state.lastResult={win, kills:combatState.kills};
  go("result");
}

/* ===================== EVENT BINDING ===================== */
function bindScreen(){
  const s=$('screen');
  s.querySelectorAll('[data-go]').forEach(el=> el.onclick=()=>{
    const t=el.dataset.go;
    if(t==="combat"){ go("combat"); }
    else if(t==="nextwave"){ nextWave(); }
    else go(t);
  });
  s.querySelectorAll('[data-pick]').forEach(el=> el.onclick=()=>{ startRun(+el.dataset.pick); });
  s.querySelectorAll('[data-sort]').forEach(el=> el.onclick=()=>{ state.sortKey=el.dataset.sort; render(); });
  s.querySelectorAll('[data-buy]').forEach(el=> el.onclick=()=>{ if(buy(+el.dataset.buy,1)) render(); });
  s.querySelectorAll('[data-sell]').forEach(el=> el.onclick=()=>{ if(sell(+el.dataset.sell,1)) render(); });
  s.querySelectorAll('[data-info]').forEach(el=> el.onclick=()=>{
    const [eid,wave,godId,margin]=el.dataset.info.split(':').map(Number);
    if(buyInfo({eid,wave,godId},margin)) render();
  });
  s.querySelectorAll('[data-slot]').forEach(el=> el.onclick=()=>{
    const id=+el.dataset.slot;
    if(state.roster.includes(id)) state.roster=state.roster.filter(r=>r!==id);
    else if(state.roster.length<ROSTER_SLOTS) state.roster.push(id);
    render();
  });
  s.querySelectorAll('[data-unslot]').forEach(el=> el.onclick=()=>{
    state.roster=state.roster.filter(r=>r!==+el.dataset.unslot); render();
  });
  s.querySelectorAll('[data-restart]').forEach(el=> el.onclick=()=> location.reload());
}
$('btnRestart').onclick=()=>location.reload();

/* ===================== FLOW CONTROL ===================== */
function startRun(godId){
  state.ws={1:40+Math.round(Math.random()*20),2:40+Math.round(Math.random()*20),3:40+Math.round(Math.random()*20),
            4:40+Math.round(Math.random()*20),5:40+Math.round(Math.random()*20),6:40+Math.round(Math.random()*20),7:BASE_POP};
  initPrices();
  prerollAllWaves();
  buy(godId,1); // starting god at LV1
  go("hub");
}
function nextWave(){
  if(state.wave>=TOTAL_WAVES){ return; }
  state.wave++;
  go("hub");
}

/* ===================== INIT ===================== */
initPrices();
render();
</script>
